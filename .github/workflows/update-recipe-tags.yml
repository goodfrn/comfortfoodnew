name: Update Recipe Tags with AI

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of recipes to process per run'
        required: false
        default: '50'
      start_index:
        description: 'Start from recipe index (0 = beginning)'
        required: false
        default: '0'

jobs:
  update-tags:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Run tag update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          START_INDEX: ${{ github.event.inputs.start_index }}
        run: python update_tags.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/recipes/
          git diff --staged --quiet || git commit -m "Auto-update recipe tags via AI [skip ci]"
          git push
