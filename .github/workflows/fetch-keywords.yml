name: 1 - Fetch Keywords from DataForSEO
on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of recipes to fetch per run'
        required: false
        default: '50'
      start_index:
        description: 'Start from recipe index (0 = beginning)'
        required: false
        default: '0'

jobs:
  fetch-keywords:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run fetch keywords script
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          START_INDEX: ${{ github.event.inputs.start_index }}
        run: python fetch_keywords.py

      - name: Commit keyword data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add keyword_data/
          git add low_keyword_recipes.txt
          git diff --staged --quiet || git commit -m "Fetch keywords batch ${{ github.event.inputs.start_index }}"
          git push
