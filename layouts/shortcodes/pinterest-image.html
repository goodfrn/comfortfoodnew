{{ $page := .Page }}
{{ if $page.Params.pinterest_image }}
{{ $mediaUrl := printf "https://images.comfortfood.uk/pinterestimage/%s.webp" $page.Params.slug }}

<div class="not-prose mb-8" style="max-width: 736px; margin: 0 auto;">
  <img src="{{ $mediaUrl }}"
       alt="{{ $page.Title }}"
       class="block rounded-2xl shadow-lg w-full"
       loading="lazy">
</div>
{{ end }}
