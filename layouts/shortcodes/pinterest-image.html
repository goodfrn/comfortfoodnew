{{ $page := .Page }}
{{ if $page.Params.pinterest_image }}
<div class="not-prose mb-8" style="position: relative; max-width: 736px; margin: 0 auto;">
  <img src="https://images.comfortfood.uk/pinterestimage/{{ $page.Params.slug }}.webp"
       alt="{{ $page.Title }}"
       class="block rounded-2xl shadow-lg w-full"
       loading="lazy">
  <a href="https://pinterest.com/pin/create/button/?url={{ $page.Permalink | urlize }}&media=https://images.comfortfood.uk/pinterestimage/{{ $page.Params.slug }}.webp&description={{ $page.Title | urlize }}"
     target="_blank"
     style="position: absolute; top: 12px; right: 12px; display: block;">
    <img src="//assets.pinterest.com/images/pidgets/pinit_fg_en_round_red_64.png" alt="Save to Pinterest" style="display:block;">
  </a>
</div>
{{ end }}
