{{ $page := .Page }}
{{ if $page.Params.pinterest_image }}
<div class="not-prose mb-8 rounded-2xl overflow-hidden shadow-lg max-w-sm mx-auto leading-none">
  <img src="https://images.comfortfood.uk/pinterestimage/{{ $page.Params.slug }}.webp"
       alt="{{ $page.Title }}"
       class="w-full block object-cover"
       loading="lazy"
       width="600"
       height="900">
</div>
{{ end }}
