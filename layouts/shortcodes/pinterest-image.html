{{ $page := .Page }}
{{ if $page.Params.pinterest_image }}
{{ $mediaUrl := printf "https://images.comfortfood.uk/pinterestimage/%s.webp" $page.Params.slug }}
{{ $pinDesc := $page.Title | urlize }}

<div class="not-prose mb-8" style="max-width: 500px; margin: 0 auto;">
  <div style="position: relative; display: inline-block; width: 100%;">
    <img src="{{ $mediaUrl }}"
         alt="{{ $page.Title }}"
         class="block rounded-2xl shadow-lg w-full"
         loading="lazy"
         data-pin-no-hover="true">
    <a href="https://pinterest.com/pin/create/button/?url={{ $page.Permalink }}&media={{ $mediaUrl }}&description={{ $pinDesc }}"
       target="_blank"
       rel="noopener"
       data-pin-do="none"
       style="position: absolute; top: 12px; right: 12px; display: block; z-index: 10;">
      <img src="https://assets.pinterest.com/images/pidgets/pinit_fg_en_round_red_64.png"
           alt="Save to Pinterest"
           style="display:block; width:40px; height:40px;"
           data-pin-no-hover="true">
    </a>
  </div>
</div>
{{ end }}
